<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Contact form</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/normalize.css">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="./css/media-queries.css">
  <script src="js/main.js" defer></script>
</head>
<body>

  <main class="c-contact">
    <h1 class="c-contact__title">Contact Us</h1>
    <form class="c-contact__form" novalidate>
      <div class="c-contact__field">
        <label class="c-contact__label" for="first-name">First Name<span class="c-contact__required" aria-hidden="true">*</span></label>
        <input
        class="c-contact__input"
        type="text" id="first-name"
        name="first-name"
        autocomplete="given-name"
        required
        >
        <p class="c-contact__error" id="first-name-error" aria-live="polite" hidden>This field is required</p>
      </div>

      <div class="c-contact__field">
        <label class="c-contact__label" for="last-name">Last Name<span class="c-contact__required" aria-hidden="true">*</span></label>
        <input
        class="c-contact__input"
        type="text"
        id="last-name"
        name="last-name"
        autocomplete="family-name"
        required
        >
        <p class="c-contact__error" id="last-name-error" aria-live="polite" hidden>This field is required</p>
      </div>

      <div class="c-contact__field c-contact__field--full">
        <label class="c-contact__label" for="email">Email Address<span class="c-contact__required" aria-hidden="true">*</span></label>
        <input class="c-contact__input"
        type="email"
        id="email"
        name="email"
        autocomplete="email"
        pattern="^[a-zA-Z0-9]+([\.\+-_]+[a-zA-Z0-9]+)*@([a-zA-Z0-9]+(-+[a-zA-Z0-9]+)*\.)+[a-zA-Z]{2,}$"
        required
        >
        <p class="c-contact__error" id="email-format-error" aria-live="polite" hidden>Please enter a valid email address</p>
        <p class="c-contact__error" id="email-required-error" aria-live="polite" hidden>This field is required</p>
      </div>

      <fieldset class="c-contact__fieldset">
        <legend class="c-contact__label">Query Type<span class="c-contact__required" aria-hidden="true">*</span></legend>
            
        <label class="c-contact__option">
          <input 
          class="c-contact__radio" 
          type="radio" 
          name="query" 
          id="general-enquiry" 
          value="general-enquiry" 
          required>
          
          General Enquiry
        </label>

        <label class="c-contact__option">
          <input 
          class="c-contact__radio" 
          type="radio" 
          name="query" 
          id="support-request" 
          value="support-request" 
          >

          Support Request
        </label>
        <p class="c-contact__error" id="query-error" aria-live="polite" hidden>Please select a query type</p>
      </fieldset>

      <div class="c-contact__field c-contact__field--full">
        <label class="c-contact__label" for="message">Message<span class="c-contact__required" aria-hidden="true">*</span></label>
        <textarea
        class="c-contact__textarea"
        name="Message"
        id="message"
        required
        ></textarea>
        <p class="c-contact__error" id="message-error" aria-live="polite" hidden>This field is required</p>
      </div>

      <div class="c-contact__field c-contact__field--full">
        <label class="c-contact__label u-flex">
          <input
          class="c-contact__checkbox"
          type="checkbox"
          name="contact-consent"
          id="contact-consent"
          required
          >
          <span>
            I consent to being contacted by the team<span class="c-contact__required" aria-hidden="true">*</span>
          </span>
        </label>
        <p class="c-contact__error" id="contact-consent-error" aria-live="polite" hidden>To submit this form, please consent to being contacted</p>
      </div>
      
      <button class="c-contact__submit" type="submit">Submit</button>
    </form>
    
      <div class="c-contact__success" role="status" aria-live="polite">
        <p class="c-contact__success-heading"></p>
        <p class="c-contact__success-text"></p>
      </div>
  </main>
  
  
  <footer class="attribution">
    <p>
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://www.frontendmentor.io/profile/VitorEmanoelNogueira">Vitor Nogueira</a>.
    </p>
  </footer>
</body>
</html>
